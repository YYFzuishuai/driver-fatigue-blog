<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f8f3ea"/>
  <text x="70" y="70" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="4">TEMPORAL REASONING</text>
  <text x="70" y="118" fill="#1e1b18" font-family="Georgia, serif" font-size="30">Why isolated cues do not equal fatigue risk</text>

  <line x1="130" y1="530" x2="1080" y2="530" stroke="#7d6e5b" stroke-width="4"/>
  <line x1="130" y1="220" x2="130" y2="530" stroke="#7d6e5b" stroke-width="4"/>
  <text x="1020" y="580" fill="#62584d" font-family="Georgia, serif" font-size="22">Time</text>
  <text x="84" y="360" fill="#62584d" font-family="Georgia, serif" font-size="20" transform="rotate(-90 84 360)">Risk</text>

  <polyline points="150,480 260,460 380,470 500,395 620,365 740,275 860,185 970,145" fill="none" stroke="#8b5e34" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g fill="#dbc4a6">
    <circle cx="260" cy="460" r="16"/>
    <circle cx="500" cy="395" r="16"/>
    <circle cx="740" cy="275" r="16"/>
  </g>
  <circle cx="970" cy="145" r="16" fill="#8b5e34"/>

  <g font-family="Georgia, serif">
    <rect x="150" y="295" width="210" height="72" rx="16" fill="#fffdf8" stroke="#ceb997"/>
    <text x="255" y="339" text-anchor="middle" fill="#1e1b18" font-size="22">Single blink</text>

    <rect x="360" y="230" width="230" height="72" rx="16" fill="#fffdf8" stroke="#ceb997"/>
    <text x="475" y="274" text-anchor="middle" fill="#1e1b18" font-size="22">Repeated yawns</text>

    <rect x="555" y="145" width="260" height="72" rx="16" fill="#fffdf8" stroke="#ceb997"/>
    <text x="685" y="189" text-anchor="middle" fill="#1e1b18" font-size="22">Prolonged eye closure</text>

    <rect x="870" y="38" width="240" height="72" rx="16" fill="#fff6ea" stroke="#8b5e34" stroke-width="2"/>
    <text x="990" y="82" text-anchor="middle" fill="#8b5e34" font-size="22">Sustained risk</text>

    <text x="160" y="500" fill="#62584d" font-size="18">normal variation</text>
    <text x="995" y="150" fill="#62584d" font-size="18">persistent decline</text>
  </g>

  <rect x="70" y="620" width="1040" height="54" rx="14" fill="#fffaf2" stroke="#ceb997"/>
  <text x="95" y="654" fill="#62584d" font-family="Georgia, serif" font-size="18">Meaning depends on duration, repetition, and whether other warning signs are accumulating.</text>
</svg>
