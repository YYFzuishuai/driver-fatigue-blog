<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f8f3ea"/><text x="70" y="70" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="4">FAIRNESS EVALUATION</text><text x="70" y="118" fill="#1e1b18" font-family="Georgia, serif" font-size="30">Average accuracy is not enough for responsible deployment</text><rect x="220" y="190" width="740" height="320" rx="16" fill="#fffdf8" stroke="#ceb997"/><g font-family="Georgia, serif" fill="#1e1b18"><text x="330" y="228" text-anchor="middle" font-size="20">Daylight</text><text x="510" y="228" text-anchor="middle" font-size="20">Night</text><text x="680" y="228" text-anchor="middle" font-size="20">Occlusion</text><text x="850" y="228" text-anchor="middle" font-size="20">Eyewear</text><text x="112" y="290" font-size="20">Group A</text><text x="112" y="360" font-size="20">Group B</text><text x="112" y="430" font-size="20">Group C</text></g><g><rect x="270" y="250" width="120" height="50" fill="#dfead5" stroke="#ceb997"/><rect x="450" y="250" width="120" height="50" fill="#e6d7ba" stroke="#ceb997"/><rect x="620" y="250" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/><rect x="790" y="250" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/><rect x="270" y="320" width="120" height="50" fill="#dfead5" stroke="#ceb997"/><rect x="450" y="320" width="120" height="50" fill="#dfead5" stroke="#ceb997"/><rect x="620" y="320" width="120" height="50" fill="#e6d7ba" stroke="#ceb997"/><rect x="790" y="320" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/><rect x="270" y="390" width="120" height="50" fill="#e6d7ba" stroke="#ceb997"/><rect x="450" y="390" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/><rect x="620" y="390" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/><rect x="790" y="390" width="120" height="50" fill="#ead0c4" stroke="#ceb997"/></g><g font-family="Georgia, serif" font-size="18" fill="#1e1b18"><text x="330" y="282" text-anchor="middle">strong</text><text x="510" y="282" text-anchor="middle">mixed</text><text x="680" y="282" text-anchor="middle">weak</text><text x="850" y="282" text-anchor="middle">weak</text><text x="330" y="352" text-anchor="middle">strong</text><text x="510" y="352" text-anchor="middle">strong</text><text x="680" y="352" text-anchor="middle">mixed</text><text x="850" y="352" text-anchor="middle">weak</text><text x="330" y="422" text-anchor="middle">mixed</text><text x="510" y="422" text-anchor="middle">weak</text><text x="680" y="422" text-anchor="middle">weak</text><text x="850" y="422" text-anchor="middle">weak</text></g><rect x="70" y="560" width="1040" height="64" rx="16" fill="#fffaf2" stroke="#ceb997"/><text x="95" y="600" fill="#62584d" font-family="Georgia, serif" font-size="18">Fairness depends on reliability across subgroups and operating conditions, not just one aggregate benchmark score.</text></svg>
