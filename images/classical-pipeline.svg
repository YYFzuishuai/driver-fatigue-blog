<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680"><rect width="1200" height="680" fill="#f8f3ea"/><text x="70" y="70" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="4">CLASSICAL PIPELINE</text><text x="70" y="118" fill="#1e1b18" font-family="Georgia, serif" font-size="30">Hand-crafted cues feeding a lightweight classifier</text><g font-family="Georgia, serif"><rect x="70" y="235" width="170" height="132" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="103" y="288" fill="#1e1b18" font-size="22">Camera</text><text x="97" y="322" fill="#62584d" font-size="18">driver face</text><rect x="290" y="235" width="180" height="132" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="334" y="288" fill="#1e1b18" font-size="22">Landmark</text><text x="330" y="322" fill="#62584d" font-size="18">detection</text><rect x="520" y="235" width="210" height="132" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="625" y="288" text-anchor="middle" fill="#1e1b18" font-size="22">Features</text><text x="625" y="322" text-anchor="middle" fill="#62584d" font-size="18">EAR, MAR, PERCLOS</text><rect x="780" y="235" width="170" height="132" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="826" y="288" fill="#1e1b18" font-size="22">SVM / RF</text><text x="827" y="322" fill="#62584d" font-size="18">classifier</text><rect x="1000" y="235" width="110" height="132" rx="18" fill="#fff6ea" stroke="#8b5e34" stroke-width="2"/><text x="1030" y="288" fill="#1e1b18" font-size="22">Alert</text><text x="1032" y="322" fill="#62584d" font-size="18">logic</text></g><g stroke="#8b5e34" stroke-width="5"><line x1="240" y1="300" x2="290" y2="300"/><line x1="470" y1="300" x2="520" y2="300"/><line x1="730" y1="300" x2="780" y2="300"/><line x1="950" y1="300" x2="1000" y2="300"/></g><g fill="#8b5e34"><path d="M290 300 l-16 -10 v20 z"/><path d="M520 300 l-16 -10 v20 z"/><path d="M780 300 l-16 -10 v20 z"/><path d="M1000 300 l-16 -10 v20 z"/></g><rect x="70" y="455" width="1040" height="116" rx="18" fill="#fffaf2" stroke="#ceb997"/><text x="100" y="500" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">STRENGTHS AND LIMITATIONS</text><text x="100" y="540" fill="#62584d" font-family="Georgia, serif" font-size="19">Efficient and interpretable, but fragile when cue extraction degrades under</text><text x="100" y="567" fill="#62584d" font-family="Georgia, serif" font-size="19">occlusion, lighting change, or unstable camera conditions.</text></svg>
