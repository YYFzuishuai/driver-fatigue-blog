<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720"><rect width="1200" height="720" fill="#f8f3ea"/><g font-family="Trebuchet MS, Segoe UI, sans-serif"><text x="70" y="70" fill="#8b5e34" font-size="22" font-weight="700" letter-spacing="4">SYSTEM OVERVIEW</text></g><text x="70" y="118" fill="#1e1b18" font-family="Georgia, serif" font-size="30">Driver fatigue detection as an integrated ML system</text><g font-family="Georgia, serif"><rect x="70" y="180" width="220" height="150" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="100" y="235" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SENSING</text><text x="100" y="278" fill="#1e1b18" font-size="24">camera feed</text><text x="100" y="312" fill="#62584d" font-size="20">face, light, pose</text><rect x="340" y="180" width="220" height="150" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="370" y="235" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">CUES</text><text x="370" y="278" fill="#1e1b18" font-size="24">eyes, yawns</text><text x="370" y="312" fill="#62584d" font-size="20">gaze, head pose</text><rect x="610" y="180" width="220" height="150" rx="18" fill="#fffdf8" stroke="#ceb997"/><text x="640" y="235" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">INFERENCE</text><text x="640" y="278" fill="#1e1b18" font-size="24">ML model</text><text x="640" y="312" fill="#62584d" font-size="20">time + risk estimate</text><rect x="880" y="180" width="220" height="150" rx="18" fill="#fff6ea" stroke="#8b5e34" stroke-width="2"/><text x="910" y="235" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">INTERVENTION</text><text x="910" y="278" fill="#1e1b18" font-size="24">alert</text><text x="910" y="312" fill="#62584d" font-size="20">break advice</text></g><g stroke="#8b5e34" stroke-width="5"><line x1="290" y1="255" x2="340" y2="255"/><line x1="560" y1="255" x2="610" y2="255"/><line x1="830" y1="255" x2="880" y2="255"/></g><g fill="#8b5e34"><path d="M340 255 l-16 -10 v20 z"/><path d="M610 255 l-16 -10 v20 z"/><path d="M880 255 l-16 -10 v20 z"/></g><rect x="70" y="410" width="1030" height="180" rx="20" fill="#fffaf2" stroke="#ceb997"/><text x="100" y="460" fill="#8b5e34" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2">WHY IT IS HARD</text><text x="100" y="510" fill="#1e1b18" font-family="Georgia, serif" font-size="28">Fatigue is latent and gradual.</text><text x="100" y="548" fill="#62584d" font-family="Georgia, serif" font-size="20">The system must infer declining alertness from imperfect cues while handling</text><text x="100" y="576" fill="#62584d" font-family="Georgia, serif" font-size="20">driver variation, changing light, occlusion, and embedded real-time limits.</text></svg>